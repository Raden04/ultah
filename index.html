<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Gift for You</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <audio id="musikBkg" loop src="backsound.mp3"></audio>
    <audio id="vnAyang" src="voice-note.mp3"></audio>

    <div id="step1" class="container">
        <h1>Halo 👋<br>Boleh tahu namamu?</h1>
        <input type="text" id="inputNama" placeholder="Ketik namamu di sini...">
        <button onclick="mulaiSurprise()">Masuk ✨</button>
    </div>

    <div id="step2" class="container hidden">
        <h1 class="title">Happy Birthday, <span id="displayNama"></span>! 🎂</h1>
        
        <div class="card">
            <p id="pesanUltah">"Semoga harimu seindah senyummu. Aku punya sesuatu yang spesial buat kamu..."</p>
            
            <div class="button-group">
                <button class="btn-vn" onclick="putarVN()">Dengerin Pesan Suara 🎙️</button>
                <button class="btn-msg" onclick="tampilPopup()">Buka Surat Rahasia ✉️</button>
            </div>
        </div>

        <div class="reply-section">
            <h3>Kirim Pesan Balik ke Aku:</h3>
            <textarea id="pesanBalik" placeholder="Tulis perasaanmu setelah buka ini..."></textarea>
            <button class="btn-send" onclick="kirimWA()">Kirim via WhatsApp 🚀</button>
        </div>
    </div>

    <div id="popup" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="tutupPopup()">&times;</span>
            <h2>Dear Zafa,</h2>
            <p>Terima kasih sudah lahir ke dunia ini. Wish you all the best, sukses dan sehat selalu. I love you so much! ❤️</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
